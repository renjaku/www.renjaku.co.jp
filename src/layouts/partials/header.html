<header class="site-header">
  <div class="container">
    <a class="brand" href="/" aria-label="連雀株式会社">
      <img src="/favicon.svg" width="28" height="28" alt="連雀">
      <span>連雀株式会社</span>
    </a>
    <button class="hamburger" type="button" aria-controls="mobile-nav" aria-expanded="false" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="desktop-nav" aria-label="Main navigation">
      <a href="/#services">サービス</a>
      <a href="/#profile">会社概要</a>
      <a href="/#contact">お問い合わせ</a>
      <a class="github-btn" href="https://github.com/renjaku/www.renjaku.co.jp">GitHub</a>
    </nav>
  </div>
  <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
    <a href="/#services">サービス</a>
    <a href="/#profile">会社概要</a>
    <a href="/#contact">お問い合わせ</a>
    <a href="https://github.com/renjaku/www.renjaku.co.jp">GitHub</a>
  </nav>
</header>
<script>
(() => {
  const header = document.querySelector('.site-header');
  if (!header) return;
  const button = header.querySelector('.hamburger');
  const mobileNav = header.querySelector('#mobile-nav');
  if (!button || !mobileNav) return;

  const close = () => {
    header.classList.remove('menu-open');
    button.setAttribute('aria-expanded', 'false');
  };
  const open = () => {
    header.classList.add('menu-open');
    button.setAttribute('aria-expanded', 'true');
  };
  button.addEventListener('click', () => {
    if (header.classList.contains('menu-open')) close();
    else open();
  });
  mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
})();
</script>
